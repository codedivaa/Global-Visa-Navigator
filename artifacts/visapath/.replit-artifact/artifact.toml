kind = "web"
previewPath = "/"
title = "VisaPath AI"
version = "1.0.0"
id = "artifacts/visapath"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18334

[services.development]
run = "pnpm --filter @workspace/visapath run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/visapath", "run", "build" ]
publicDir = "artifacts/visapath/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18334"
BASE_PATH = "/"
